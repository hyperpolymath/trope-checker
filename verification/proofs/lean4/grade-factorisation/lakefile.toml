name = "gradeFactorisation"
defaultTargets = ["GradeFactorisation"]

# Reuse grade-boundary's carrier by path-import. Its mathlib (v4.16.0) + transitive
# deps are shared through .lake/packages (symlinked to ../grade-boundary), so nothing
# re-clones or re-builds. Same toolchain (see ./lean-toolchain).
[[require]]
name = "gradeBoundary"
path = "../grade-boundary"

[[lean_lib]]
name = "GradeFactorisation"
