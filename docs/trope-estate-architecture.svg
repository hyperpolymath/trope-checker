<svg width="100%" viewBox="0 0 700 470" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Trope-particularity — three repositories, one pipeline</title>
<desc>A language (gray) writes and type-checks programs and emits the Trope IR (a white conduit), which the tropechecker (teal, the trust boundary, which also holds the formal calculus and IR schema) consumes to produce a verdict (coral): p-sufficient or p-insufficient. Below, the Particularity workbench (purple) defines the vocabulary — the named effects, the residual, the verdict — and is realised by both the language and the checker. The checker depends on no language; the language is one producer of the IR among potentially many.</desc>
<style>
text{font-family:'Helvetica Neue',Arial,sans-serif;}
.t{font-size:13px;font-weight:400;}
.ts{font-size:11.5px;font-weight:400;}
.th{font-size:14px;font-weight:500;}
.lbl{font-size:11px;font-weight:400;font-style:italic;}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="700" height="470" rx="12" fill="#FFFFFF"/>

<text class="th" x="350" y="32" fill="#2C2C2A" text-anchor="middle" font-size="17">Trope-particularity — three repositories, one pipeline</text>
<text class="lbl" x="350" y="54" fill="#5F5E5A" text-anchor="middle" font-size="12.5">A language produces the IR · a portable checker consumes it · a workbench defines the words both use</text>

<!-- Language -->
<rect x="44" y="88" width="158" height="66" rx="9" fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/>
<text class="th" x="123" y="110" fill="#2C2C2A" text-anchor="middle">Haec</text>
<text class="ts" x="123" y="129" fill="#5F5E5A" text-anchor="middle">a language (one of many)</text>
<text class="ts" x="123" y="145" fill="#5F5E5A" text-anchor="middle">writes, checks, emits IR</text>

<line x1="202" y1="121" x2="242" y2="121" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Trope IR conduit -->
<rect x="244" y="93" width="128" height="56" rx="28" fill="#FFFFFF" stroke="#888780" stroke-width="0.8"/>
<text class="th" x="308" y="115" fill="#2C2C2A" text-anchor="middle">Trope IR</text>
<text class="ts" x="308" y="134" fill="#5F5E5A" text-anchor="middle">graded-effect DAG</text>

<line x1="372" y1="121" x2="412" y2="121" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Checker -->
<rect x="414" y="84" width="246" height="74" rx="9" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.6"/>
<text class="th" x="537" y="106" fill="#085041" text-anchor="middle">tropechecker</text>
<text class="ts" x="537" y="125" fill="#0F6E56" text-anchor="middle">consumes IR &#8594; verdict · trust boundary</text>
<text class="ts" x="537" y="143" fill="#0F6E56" text-anchor="middle">holds the formal calculus + IR schema</text>

<line x1="537" y1="158" x2="537" y2="180" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Verdict -->
<rect x="430" y="182" width="214" height="34" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.6"/>
<text class="t" x="537" y="203" fill="#712B13" text-anchor="middle">verdict — p-sufficient | p-insufficient</text>

<!-- Workbench -->
<rect x="44" y="300" width="616" height="86" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.6"/>
<text class="th" x="352" y="326" fill="#3C3489" text-anchor="middle">Particularity — the vocabulary</text>
<text class="ts" x="352" y="347" fill="#4C44A0" text-anchor="middle">informal · the named effects · the residual · the verdict</text>
<text class="ts" x="352" y="365" fill="#6A63BC" text-anchor="middle">defines the words both sides use; depends on nothing</text>

<!-- realised-by links -->
<line x1="112" y1="300" x2="112" y2="156" stroke="#7F77DD" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text class="lbl" x="118" y="232" fill="#6A63BC">realised by</text>
<line x1="646" y1="300" x2="646" y2="160" stroke="#7F77DD" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text class="lbl" x="586" y="262" fill="#6A63BC" text-anchor="end">realised by &amp; formalised in</text>

<!-- legend -->
<rect x="44" y="416" width="13" height="13" rx="3" fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/>
<text class="ts" x="63" y="423" fill="#5F5E5A" dominant-baseline="central">Language</text>
<rect x="150" y="416" width="13" height="13" rx="3" fill="#FFFFFF" stroke="#888780" stroke-width="0.8"/>
<text class="ts" x="169" y="423" fill="#5F5E5A" dominant-baseline="central">Trope IR (wire format)</text>
<rect x="316" y="416" width="13" height="13" rx="3" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.6"/>
<text class="ts" x="335" y="423" fill="#5F5E5A" dominant-baseline="central">Checker (trust boundary)</text>
<rect x="494" y="416" width="13" height="13" rx="3" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.6"/>
<text class="ts" x="513" y="423" fill="#5F5E5A" dominant-baseline="central">Workbench (vocabulary)</text>
<rect x="636" y="416" width="13" height="13" rx="3" fill="#FAECE7" stroke="#D85A30" stroke-width="0.6"/>
<text class="ts" x="655" y="423" fill="#5F5E5A" dominant-baseline="central">Verdict</text>
</svg>
