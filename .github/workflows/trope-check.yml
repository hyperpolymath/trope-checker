#
# Trope-particularity checks: IR schema validation + conformance suite (always),
# and the Idris2 verified core typecheck (best-effort, if idris2 is available).
name: trope-check

on:
  push:
    paths:
      - 'schemas/**'
      - 'src/checker/**'
      - 'tests/conformance/**'
      - 'verification/proofs/idris2/**'
      - 'spec/**'
      - '.github/workflows/trope-check.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schema-and-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install jsonschema
        run: python -m pip install --upgrade jsonschema
      - name: Validate Trope IR schema + fixtures
        run: python3 tests/conformance/validate_schema.py
      - name: Run conformance suite (IR -> verdict, witnesses)
        run: python3 tests/conformance/run.py

  verified-core:
    runs-on: ubuntu-latest
    continue-on-error: true   # idris2 toolchain is environment-dependent
    steps:
      - uses: actions/checkout@v4
      - name: Typecheck the verified core (if idris2 present)
        run: |
          if command -v idris2 >/dev/null 2>&1; then
            cd verification/proofs/idris2 && idris2 --typecheck trope.ipkg
          else
            echo "idris2 not available on this runner; skipping (see docs/status/PROOF-STATUS.adoc)."
          fi
      - name: Guard against unsound constructs in the proofs
        run: |
          if grep -rEn 'believe_me|assert_total|postulate|really_believe_me' verification/proofs/idris2/Trope/; then
            echo "Unsound construct found in the verified core"; exit 1
          fi
          echo "verified core: no unsound constructs"
