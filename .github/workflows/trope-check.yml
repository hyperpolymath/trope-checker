#
# Trope-particularity checks (no Python). The jq well-formedness job is the
# reliable signal; the Idris2 verified-core + conformance job is best-effort
# (the toolchain is environment-dependent).
name: trope-check

on:
  push:
    paths:
      - 'schemas/**'
      - 'src/idris2/**'
      - 'tests/conformance/**'
      - 'verification/proofs/idris2/**'
      - 'spec/**'
      - '.github/workflows/trope-check.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ir-wellformed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every IR fixture + the schema is well-formed JSON
        run: |
          for f in tests/conformance/fixtures/*.ir.json \
                   tests/conformance/schema-invalid/*.json \
                   schemas/trope-ir.schema.json tests/conformance/cases.json; do
            jq -e . "$f" >/dev/null || { echo "malformed JSON: $f"; exit 1; }
          done
          echo "all IR fixtures + schema are well-formed JSON"
      - name: No unsound constructs in the verified core
        run: |
          if grep -rEn 'believe_me|assert_total|postulate|really_believe_me' verification/proofs/idris2/Trope; then
            echo "unsound construct found"; exit 1
          fi
          echo "verified core: no unsound constructs"

  verified-core-and-conformance:
    runs-on: ubuntu-latest
    continue-on-error: true   # idris2 + chez toolchain is environment-dependent
    steps:
      - uses: actions/checkout@v4
      - name: Typecheck core, build checker, run conformance (if idris2 present)
        run: |
          if command -v idris2 >/dev/null 2>&1; then
            ( cd verification/proofs/idris2 && idris2 --typecheck trope.ipkg )
            idris2 --install verification/proofs/idris2/trope.ipkg
            ( cd src/idris2 && idris2 --build tropecheck.ipkg )
            bash tests/conformance/run.sh
          else
            echo "idris2 not available on this runner; skipping (see docs/status/PROOF-STATUS.adoc)."
          fi

  rust-fast-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the Rust fast-core (dep-free, offline) and run the conformance corpus
        run: |
          ( cd src/rust && cargo build --release )
          TROPECHECK_BIN=src/rust/target/release/tropecheck-rs bash tests/conformance/run.sh
