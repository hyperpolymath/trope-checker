# SPDX-License-Identifier: MPL-2.0
name: "🟡 Check: CodeQL security analysis"
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'
permissions:
  contents: read
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default to `actions` — scaffolded repos rarely have JS/TS
          # source; `javascript-typescript` produced "no source files"
          # failures on every CodeQL run. The `actions` extractor scans
          # workflow files which every repo has. Override per-repo if
          # the scaffolded project actually contains JS/TS code.
          # Per hypatia rule `codeql_language_matrix_mismatch`.
          - language: actions
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3.28.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3.28.1
        with:
          category: "/language:${{ matrix.language }}"
